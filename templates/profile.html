<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profile | Game Store</title>
  <link rel="stylesheet" href="/statics/style.css">
  <style>
    /* Basic modern UI styling */
    body {
      background-color: #121212;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #1b1b1b;
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      margin: 0;
      font-size: 1.5rem;
    }
    nav ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
    }
    nav ul li {
      margin-left: 1rem;
    }
    nav ul li a {
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
      transition: color 0.3s ease;
    }
    nav ul li a:hover {
      color: #4CAF50;
    }
    .container {
      max-width: 600px;
      margin: 2rem auto;
      background-color: #1b1b1b;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
    }
    h2 {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .profile-form label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: bold;
    }
    .profile-form input {
      width: 100%;
      padding: 0.75rem;
      margin-bottom: 1rem;
      border: none;
      border-radius: 4px;
      background-color: #333;
      color: #fff;
      font-size: 1rem;
    }
    .profile-form input:focus {
      outline: none;
      box-shadow: 0 0 5px #4CAF50;
    }
    .profile-form input:disabled {
      background-color: #555;
      cursor: not-allowed;
    }
    .profile-form button {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 4px;
      background-color: #4CAF50;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    .profile-form button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>
  <header>
    <h1>GAME STORE</h1>
    <nav>
      <ul>
        <li><a href="/index.html">Home</a></li>
        <li><a href="/store.html">Store</a></li>
        <li><a href="/profile">Profile</a></li>
        <li><a href="/">Logout</a></li>
      </ul>
    </nav>
  </header>
  <div class="container">
    <h2>Your Profile</h2>
    <form class="profile-form" id="profile-form">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="Enter your username" required disabled>
      
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" required disabled>
      
      <label for="phone">Phone</label>
      <input type="text" id="phone" name="phone" placeholder="Enter your phone number">
      
      <button type="submit">Update Profile</button>
    </form>
  </div>
  <script>
    // Assume the current user's email is stored in sessionStorage (or similar)
    const currentEmail = sessionStorage.getItem("user_email") || "user@example.com";

    // Fetch current profile details on page load
    window.addEventListener("DOMContentLoaded", async () => {
      try {
        const response = await fetch(`/api/profile?email=${encodeURIComponent(currentEmail)}`);
        if (!response.ok) throw new Error("Failed to fetch profile.");
        const data = await response.json();
        const user = data.user;
        document.getElementById("username").value = user.username;
        document.getElementById("email").value = user.email;
        document.getElementById("phone").value = user.phone || "";
      } catch (error) {
        console.error("Error fetching profile:", error);
      }
    });

    // Handle form submission for profile update (only phone will be updated)
    document.getElementById("profile-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const updatedProfile = {
        current_email: currentEmail,
        username: document.getElementById("username").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value
      };
      try {
        const response = await fetch("/api/profile", {
          method: "PUT",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(updatedProfile)
        });
        if (!response.ok) throw new Error("Failed to update profile.");
        alert("Profile updated successfully!");
      } catch (error) {
        console.error("Error updating profile:", error);
        alert("Error updating profile. Please try again.");
      }
    });
  </script>
</body>
</html>
